<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Calculator</title>
		<link rel="stylesheet" href="style.css" />
		<link rel="stylesheet" href="reset.css" />
	</head>
	<body class="background">
		<main class="container">
			<div class="calculator">
				<div class="calculator__display">
					<p class="calculator__display--result">10 * 10 =</p>
					<h1 class="calculator__display--answer">100</h1>
				</div>

				<div class="calculator__keys">
					<button class="calculator__keys--number">7</button>
					<button class="calculator__keys--number">8</button>
					<button class="calculator__keys--number">9</button>
					<button class="calculator__keys--operator">+/-</button>
					<button class="calculator__keys--operator">Del</button>

					<button class="calculator__keys--number">4</button>
					<button class="calculator__keys--number">5</button>
					<button class="calculator__keys--number">6</button>
					<button class="calculator__keys--operator">X</button>
					<button class="calculator__keys--operator">÷</button>

					<button class="calculator__keys--number">1</button>
					<button class="calculator__keys--number">2</button>
					<button class="calculator__keys--number">3</button>
					<button class="calculator__keys--operator">-</button>
					<button class="calculator__keys--equal">=</button>

					<button class="calculator__keys--clear">C</button>
					<button class="calculator__keys--number">0</button>
					<button class="calculator__keys--number">.</button>
					<button class="calculator__keys--operator">+</button>
				</div>
			</div>
		</main>
		<footer class="credits">
			<p class="copyright"></p>
		</footer>
		<script src="script.js"></script>
	</body>
</html>
